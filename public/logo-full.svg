    <linearGradient id="pface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#383838"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <linearGradient id="wmSteel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#909090"/>
      <stop offset="35%"  stop-color="#f0f0f0"/>
      <stop offset="65%"  stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <linearGradient id="wmGold" x1="0" y1="0" x2="1" y2="0">
