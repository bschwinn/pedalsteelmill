      <stop offset="30%"  stop-color="#d4a824"/>
      <stop offset="55%"  stop-color="#e8c040"/>
      <stop offset="80%"  stop-color="#c09820"/>
      <stop offset="100%" stop-color="#8a6a10"/>
    </linearGradient>
    <linearGradient id="xbar" x1="0" y1="0" x2="1" y2="0">
