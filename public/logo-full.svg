<svg xmlns="http://www.w3.org/2000/svg" width="600" height="440" viewBox="0 0 600 440" role="img">
  <title>Pedal Steel Mill — Full Logo</title>
  <desc>PedalSteelMill full logo. PEDAL in bright steel, STEEL MILL in wound-string gold, 10 strings, chrome slide bar, 3 pedals.</desc>

  <defs>
    <linearGradient id="chr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#787878"/>
      <stop offset="28%"  stop-color="#efefef"/>
      <stop offset="55%"  stop-color="#d4d4d4"/>
      <stop offset="100%" stop-color="#848484"/>
    </linearGradient>
    <linearGradient id="brH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5a5a5a"/>
      <stop offset="35%"  stop-color="#c8c8c8"/>
      <stop offset="65%"  stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#5a5a5a"/>
    </linearGradient>
    <linearGradient id="brV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b0b0b0"/>
      <stop offset="40%"  stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#888888"/>
