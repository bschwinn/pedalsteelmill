      <stop offset="25%"  stop-color="#585a60"/>
      <stop offset="50%"  stop-color="#686a70"/>
      <stop offset="75%"  stop-color="#585a60"/>
      <stop offset="100%" stop-color="#2c2e32"/>
    </linearGradient>
