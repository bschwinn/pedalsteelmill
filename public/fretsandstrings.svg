  <title
     id="title1">Pedal Steel Mill — Guitar Neck, Frets 0–15</title>
  <desc
     id="desc1">10-string pedal steel guitar neck with accurate equal temperament fret spacing, alternating silver and gold strings with progressive gauge, diamond position markers at frets 3 5 7 9 12 15, stacked double diamond at fret 12, fret numbers in dark top band.</desc>
