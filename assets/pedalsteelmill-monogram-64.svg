<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img">
  <title>Pedal Steel Mill — PSM Monogram 64x64</title>
  <desc>PSM lettermark in brushed steel with gold accent string line, for favicons and small UI use.</desc>

  <defs>
    <linearGradient id="wmSteel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#909090"/>
      <stop offset="35%"  stop-color="#f0f0f0"/>
      <stop offset="65%"  stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#1c1e24"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#2a2c34" stroke-width="1"/>

  <text x="32" y="38" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="600" letter-spacing="1"
        fill="url(#wmSteel)">PSM</text>

  <!-- gold string accent matching wound strings -->
  <line x1="10" y1="46" x2="54" y2="46" stroke="#c09820" stroke-width="1.5"/>
  <!-- silver string accent -->
  <line x1="10" y1="50" x2="54" y2="50" stroke="#a8a8a8" stroke-width="1"/>

</svg>
